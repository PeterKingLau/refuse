<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- <script type="text/javascript" src="https://webapi.amap.com/maps?v=1.4.15&key=1fbe431a5c04fd4df2364411a8c8415b"></script> -->
    <title><%= title %></title>
  </head>
  <body>
    <div id="app">
      <style>
        body {
          font-family: '思源黑体';
          font-size: 10px;
        }

        .app-loading {
          display: flex;
          width: 100%;
          height: 100%;
          justify-content: center;
          align-items: center;
          flex-direction: column;
          background: #f0f2f5;
        }

        .app-loading .app-loading-wrap {
          position: absolute;
          top: 50%;
          left: 50%;
          display: flex;
          transform: translate3d(-50%, -50%, 0);
          justify-content: center;
          align-items: center;
          flex-direction: column;
        }

        .app-loading .app-loading-title {
          margin-bottom: 30px;
          font-size: 20px;
          font-weight: bold;
          text-align: center;
        }

        .app-loading .app-loading-logo {
          width: 100px;
          margin: 0 auto 15px auto;
        }

        .app-loading .app-loading-item {
          display: flex;
          width: 72px;
          height: 24px;
          align-items: center;
          justify-content: center;
          gap: 8px;
        }

        .app-loading .app-loading-dot {
          width: 10px;
          height: 10px;
          background: #2d8cf0;
          border-radius: 50%;
          box-shadow: 0 4px 10px rgba(45, 140, 240, 0.25);
          animation: loader-dot 0.9s ease-in-out infinite;
        }

        .app-loading .app-loading-dot:nth-child(2) {
          background: #49a6ff;
          animation-delay: 0.12s;
        }

        .app-loading .app-loading-dot:nth-child(3) {
          background: #87bdff;
          animation-delay: 0.24s;
        }

        @keyframes loader-dot {
          0%,
          80%,
          100% {
            opacity: 0.45;
            transform: translateY(0);
          }

          40% {
            opacity: 1;
            transform: translateY(-10px);
          }
        }
      </style>
      <div class="app-loading">
        <div class="app-loading-wrap">
          <div class="app-loading-title">
            <img src="/logo.png" class="app-loading-logo" alt="Logo" />
            <div class="app-loading-title"><%= title %></div>
          </div>
          <div class="app-loading-item" aria-label="加载中">
            <span class="app-loading-dot"></span>
            <span class="app-loading-dot"></span>
            <span class="app-loading-dot"></span>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
